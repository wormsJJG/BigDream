<h2>검사 진행 중</h2>
<div class="content-card scan-animation-card">
    <div class="scanner-animation">
        <div class="phone">
            <div class="notch"></div>
            <div class="phone-screen">
                <div class="scanner-beam" id="scanBeam"></div>
                <i class="fas fa-triangle-exclamation hack-icon"></i>
                <div class="hack-alert">SYSTEM<br />SCANNING</div>
                <div style="margin-top:20px; color:#00d2ff; font-size:14px; font-weight:bold;">
                    [!] 비정상 권한 접근 탐지...<br />
                    [!] 실시간 프로세스 감시...<br />
                    [!] AI 기반 지능형 위협 분석 중...
                </div>
                <div class="data-particle dp-1">App</div>
                <div class="data-particle dp-2">File</div>
                <div class="data-particle dp-3">System</div>
                <div class="data-particle dp-4">Network</div>
            </div>
        </div>
    </div>
    <p id="scan-status-text">기기 연결을 확인하는 중...</p>
    <div class="ios-stepper">
        <div class="ios-stepper-line"></div>
        <div id="ios-stepper-progress"></div>

        <div class="ios-step current" id="ios-step-1">
            <div class="ios-step-circle">
                <span class="ios-step-check">✓</span>
            </div>
            <div class="ios-step-label">기기 확인</div>
        </div>

        <div class="ios-step pending" id="ios-step-2">
            <div class="ios-step-circle">
                <span class="ios-step-check">✓</span>
            </div>
            <div class="ios-step-label">데이터 수집</div>
        </div>

        <div class="ios-step pending" id="ios-step-3">
            <div class="ios-step-circle">
                <span class="ios-step-check">✓</span>
            </div>
            <div class="ios-step-label">정밀 분석</div>
        </div>

        <div class="ios-step pending" id="ios-step-4">
            <div class="ios-step-circle">
                <span class="ios-step-check">✓</span>
            </div>
            <div class="ios-step-label">결과 정리</div>
        </div>
    </div>
    <div class="warning-box">
        <img alt="Warning" src="./assets/icon-warning.png" />
        <span><strong>경고:</strong> 검사가 완료될 때까지 USB 케이블을 절대 분리하지 마십시오.</span>
    </div>
</div>
