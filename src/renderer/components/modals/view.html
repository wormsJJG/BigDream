<div class="modal hidden" id="admin-modal">
  <div class="modal-content">
    <h3 class="bd-modal-title">⚡ 관리자 설정</h3>
    <p class="bd-modal-desc bd-preline">
      안드로이드 검사 소요 시간(분)을 입력하세요.<br/>
      <span class="bd-modal-hint">(범위: 10~60, 해제: 0)</span>
    </p>
    <input id="admin-input" class="bd-modal-input" placeholder="0" type="number"/>
    <div class="bd-modal-actions bd-modal-actions-right">
      <button class="secondary-button" id="admin-cancel-btn">취소</button>
      <button class="primary-button" id="admin-save-btn">저장</button>
    </div>
  </div>
</div>

<div class="modal hidden bd-modal-z10000" id="custom-alert-modal">
  <div class="modal-content bd-modal-content-sm bd-modal-center">
    <div class="bd-modal-emoji">📢</div>
    <p id="custom-alert-msg" class="bd-modal-message bd-preline">알림 내용</p>
    <button class="primary-button bd-modal-fullwidth" id="custom-alert-ok-btn">확인</button>
  </div>
</div>

<div class="modal hidden bd-modal-z10000" id="custom-confirm-modal">
  <div class="modal-content bd-modal-content-md bd-modal-center">
    <div class="bd-modal-emoji">🤔</div>
    <p id="custom-confirm-msg" class="bd-modal-message bd-preline">진행하시겠습니까?</p>
    <div class="bd-confirm-actions">
      <button class="secondary-button bd-flex1" id="custom-confirm-cancel-btn">취소</button>
      <button class="primary-button bd-flex1" id="custom-confirm-ok-btn">확인</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="admin-result-modal">
  <div class="modal-content bd-modal-content-lg bd-modal-scroll">
    <h3 class="bd-modal-title">📊 검사 이력 확인</h3>
    <div id="admin-result-content">로딩 중...</div>
    <div class="bd-modal-footer-right">
      <button class="secondary-button" id="admin-result-close-btn">닫기</button>
    </div>
  </div>
</div>

<div class="modal hidden bd-update-modal bd-modal-z11000" id="update-modal">
  <div class="modal-content bd-update-content">
    <div class="update-icon bd-update-icon">🚀</div>
    <h2 class="bd-update-title">새로운 버전 업데이트</h2>
    <p id="update-ver-text" class="bd-update-subtitle">버전 정보를 불러오는 중...</p>

    <div class="bd-update-progress">
      <div id="update-progress-fill" class="bd-update-progress-fill"></div>
    </div>

    <div class="bd-update-stats">
      <span id="update-percent">0%</span>
      <span id="update-speed">0 KB/s</span>
    </div>

    <div id="update-size-info" class="bd-update-size">0MB / 0MB</div>

    <p class="bd-update-warn">업데이트 완료 후 앱이 자동으로 재시작됩니다.</p>
  </div>
</div>
