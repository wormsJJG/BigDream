<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BD-Scanner Loading</title>
  <style>
    body {
      margin: 0;
      font-family: "Noto Sans KR", sans-serif;
      background: #0e1a2b;
      color: #f3f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .panel {
      width: 100%;
      max-width: 320px;
      padding: 24px 28px;
      border-radius: 16px;
      background: linear-gradient(180deg, #16253a 0%, #101a2a 100%);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 16px;
      border: 3px solid rgba(255, 255, 255, 0.18);
      border-top-color: #f2c14e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    p {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(243, 246, 251, 0.78);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="spinner" aria-hidden="true"></div>
    <h1>필수 구성 요소를 확인하는 중입니다</h1>
    <p>초기 설정이 끝나면 자동으로 다음 단계로 이동합니다.</p>
  </section>
</body>
</html>
